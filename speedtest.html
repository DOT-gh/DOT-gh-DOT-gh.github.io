<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Speedtest — dotkit.me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Speedtest</h1>
    <div class="subtitle">Проверь скорость интернета, пинг и джиттер</div>
    <div class="glow-bar"></div>
    <div class="cta-buttons">
      <a href="index.html">← На главную</a>
    </div>
  </header>
  <main>
    <div class="speedtest-container">
      <div>
        <div class="speed-label">Download</div>
        <div id="download" class="speed-value">0 Mbps</div>
      </div>
      <div>
        <div class="speed-label">Upload</div>
        <div id="upload" class="speed-value">0 Mbps</div>
      </div>
      <div>
        <div class="speed-label">Ping</div>
        <div id="ping" class="speed-value">0 ms</div>
      </div>
      <div>
        <div class="speed-label">Jitter</div>
        <div id="jitter" class="speed-value">0 ms</div>
      </div>
      <button class="start-btn" onclick="startSpeedtest()">Начать тест</button>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/gh/librespeed/speedtest@master/speedtest.js"></script>
  <script>
    let s = new Speedtest();
    function startSpeedtest() {
      s.onupdate = function(data){
        document.getElementById("download").textContent = data.dlStatus + " Mbps";
        document.getElementById("upload").textContent = data.ulStatus + " Mbps";
        document.getElementById("ping").textContent = data.pingStatus + " ms";
        document.getElementById("jitter").textContent = data.jitterStatus + " ms";
      };
      s.onend = function(){};
      s.start();
    }
  </script>
</body>
</html>
